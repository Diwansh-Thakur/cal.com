services:
  - type: web
    name: cal-clone-web
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        sync: false 
      - key: NODE_ENV
        value: production

  - type: web
    name: cal-clone-api
    env: node
    buildCommand: "npm install && npx prisma generate && cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: DATABASE_URL
        sync: false 
